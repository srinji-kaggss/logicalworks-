name: Keel CI (authority projection)

# GitHub Actions is a THIN PROJECTION of the local Keel authority, not a second gate.
# It runs the one real runner — `node scripts/ci/run.mjs` — which evaluates every commit-tier
# lane (the Keel authority + target.gate over lgwks.profile.json + the full pytest suite + the
# Rust crates + coverage completeness). The schema-registry check (#147) is no longer a separate
# job here: it is the `specification_fidelity` atom in lgwks.profile.json, gated by lgwks_floor,
# so it runs THROUGH the authority (#242 — one authority, no parallel copy to drift).
# Authority + determinism live in `scripts/ci/run.mjs`; this file only supplies the toolchain.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  keel-ci:
    name: keel ci — commit tier (single authority)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # node is preinstalled on ubuntu-latest; rust/cargo is preinstalled for the Rust lanes.
      # uv (above) backs the hermetic pytest.suite lane. A missing tool makes a lane fail-closed
      # (NO-GO), never a silent pass — the runner's own contract.
      # poppler-utils supplies pdftotext/pdftoppm/pdfinfo — the primary PDF-extract path in
      # lgwks_extract.py. It is present on the local Keel host, so the projection must supply it
      # too; without it tests/test_realworld_extract_convert.py::...::test_text_layer_pdf_extracts
      # fails-closed and takes pytest.suite → testability_falsifiability → lgwks_floor to NO-GO.
      - name: install toolchain deps (poppler-utils for the PDF-extract lane)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils
      - name: node scripts/ci/run.mjs --tier commit
        run: node scripts/ci/run.mjs --tier commit
      - name: upload sealed run record
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-run-record
          path: .ci-runs/
          if-no-files-found: ignore
